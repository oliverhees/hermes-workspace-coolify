# documentation: https://github.com/outsourc-e/hermes-workspace
# slogan: Hermes Workspace — Multi-Agent-Orchestrierung (Conductor + Swarm Mode) für den Hermes Agent, self-hosted.
# category: ai
# tags: ai, agent, hermes, orchestration, swarm, conductor, multi-agent
# logo: svgs/hermes-agent.svg
# port: 3000

# ──────────────────────────────────────────────────────────────────────────
# Hermes Workspace (outsourc-e) — Coolify-Deployment
#
# ⚠️ PFLICHT in Coolify → Environment Variables (sonst startet der Gateway nicht):
#   API_SERVER_KEY    = <langer Zufallswert, z.B. `openssl rand -hex 32`>
#   HERMES_PASSWORD   = <Passwort für die Workspace-UI, 32+ Zeichen>
#   ANTHROPIC_API_KEY = <oder ein anderer Provider-Key>
#
#   Grund: Der Hermes-Gateway bindet auf 0.0.0.0 und VERWEIGERT den Start ohne
#   API_SERVER_KEY → Port 8642 down → Container "unhealthy". Verifiziert.
#
# Zwei Container: hermes-agent (Gateway :8642 + Dashboard :9119) + hermes-workspace (:3000).
# Eigenständige Instanz (eigenes Volume) — NICHT das nesquena-Backend.
# ──────────────────────────────────────────────────────────────────────────

services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    command: ["gateway", "run"]
    restart: unless-stopped
    environment:
      - HERMES_UID=10010
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      # PFLICHT — explizit in Coolify setzen (sonst startet 8642 nicht):
      - API_SERVER_KEY=${API_SERVER_KEY}
      # LLM-Provider: MINDESTENS EINEN setzen
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    volumes:
      - hermes-agent-data:/opt/data
    healthcheck:
      # Nur der Gateway-API-Port — das ist, was das Workspace braucht.
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8642/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  hermes-workspace:
    image: ghcr.io/outsourc-e/hermes-workspace:latest
    restart: unless-stopped
    depends_on:
      hermes-agent:
        condition: service_healthy
    environment:
      # Coolify routet Proxy + TLS auf Port 3000 und generiert die Domain
      - SERVICE_FQDN_HERMESWORKSPACE_3000
      - HERMES_HOME=/home/workspace/.hermes
      - HERMES_WORKSPACE_DIR=/workspace
      - HERMES_API_URL=http://hermes-agent:8642
      - HERMES_DASHBOARD_URL=http://hermes-agent:9119
      # Muss exakt dem API_SERVER_KEY des Agents entsprechen
      - HERMES_API_TOKEN=${API_SERVER_KEY}
      # Workspace-UI-Passwort (Pflicht bei Remote) — explizit in Coolify setzen
      - HERMES_PASSWORD=${HERMES_PASSWORD}
      - COOKIE_SECURE=1
      - TRUST_PROXY=1
    volumes:
      - hermes-agent-data:/home/workspace/.hermes
      - hermes-workspace-files:/workspace

volumes:
  hermes-agent-data:
  hermes-workspace-files:
